recipe: togaf-adm-full
schema_version: 1
description: >
  Full TOGAF ADM cycle: foundation artefacts, ADM Preliminary / Architecture
  Vision, business capability mapping, application inventory and rationalisation,
  data architecture (Phase C.2), technology architecture (Phase D), gap analysis,
  transition architecture, governance, optional change management,
  and optional architecture repository synthesis.

defaults:
  version: "1.0"

optional_targets:
  ACHG:
    description: Architecture change request for scoped post-baseline changes
    default: false
  REPO:
    description: Architecture repository synthesis from completed ADM artefacts
    default: false

post_build_hooks:
  - skill: arckit:health
    args: ""
  - skill: arckit:traceability
    args: ""

# Schema: each target may declare:
#   deps:          list of required dependencies (block execution if missing)
#   optional_deps: list of soft dependencies (feed context if available, never block)

targets:
  - id: PRIN
    skill: arckit:principles
    args: ""
    output: { project: "000-global", type: PRIN }
    deps: []

  - id: REQ
    skill: arckit:requirements
    args: "Project: {NAME}. Requirements scope: {REQ_SCOPE}"
    output: { project: "{P}-{NAME}", type: REQ }
    deps: [PRIN]

  - id: STKE
    skill: arckit:stakeholders
    args: "Project: {NAME}. Stakeholder focus: {STKE_SCOPE}"
    output: { project: "{P}-{NAME}", type: STKE }
    deps: [PRIN]

  - id: STRATEGY
    skill: arckit:strategy
    args: ""
    output: { project: "000-global", type: STRAT }
    deps: [PRIN]
    optional_deps: [STKE]

  - id: ADMP
    skill: arckit:adm-preliminary
    args: "{P}"
    output: { project: "{P}-{NAME}", type: ADMP }
    deps: [PRIN, STRATEGY]
    optional_deps: [STKE]

  - id: BPCM
    skill: arckit:business-capability-map
    args: "{P}"
    output: { project: "{P}-{NAME}", type: BPCM }
    deps: [ADMP, PRIN]
    optional_deps: [REQ, STKE]

  - id: APP
    skill: arckit:application-inventory
    args: "{P}"
    output: { project: "{P}-{NAME}", type: APP }
    deps: [ADMP, BPCM]

  - id: DATA
    skill: arckit:data-architecture
    args: "{P}"
    output: { project: "{P}-{NAME}", type: DATA }
    deps: [BPCM]
    optional_deps: [APP]

  - id: TECH
    skill: arckit:technology-architecture
    args: "{P}"
    output: { project: "{P}-{NAME}", type: TECH }
    deps: []
    optional_deps: [APP, DATA]

  - id: APPR
    skill: arckit:application-rationalization
    args: "{P}"
    output: { project: "{P}-{NAME}", type: APPR }
    deps: [APP]
    optional_deps: [BPCM, DATA]

  - id: GAPA
    skill: arckit:gap-analysis
    args: "{P}"
    output: { project: "{P}-{NAME}", type: GAPA }
    deps: [STRATEGY]
    optional_deps: [BPCM, APP, APPR, TECH]

  - id: TRANS
    skill: arckit:transition-architecture
    args: "{P}"
    output: { project: "{P}-{NAME}", type: TRANS }
    deps: [GAPA]

  - id: BORD
    skill: arckit:architecture-board
    args: "{P}"
    output: { project: "{P}-{NAME}", type: BORD }
    deps: [PRIN, ADMP]

  - id: ACHG
    skill: arckit:architecture-change
    args: "{P}"
    output: { project: "{P}-{NAME}", type: ACHG }
    deps: [BORD, TRANS]

  - id: REPO
    skill: arckit:architecture-repository
    args: "000"
    output: { project: "000-global", type: REPO }
    deps: []
    optional_deps: [PRIN, STRATEGY, ADMP, BPCM, APP, APPR, DATA, TECH, GAPA, TRANS, BORD]