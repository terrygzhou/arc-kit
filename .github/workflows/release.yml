name: Release

on:
  # Manual override
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v6.2.0)'
        required: false
        type: string
  # Also trigger when a GitHub Release is published manually
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine target tag
        id: tag
        run: |
          if [[ -n "${{ github.event.inputs.tag }}" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            echo "No tag provided, exiting"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Skip if release exists
        if: steps.tag.outputs.skip != 'true'
        id: check
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          if gh release view "$TAG" &>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Release $TAG already exists, skipping"
          fi

      - name: Generate release notes
        if: steps.check.outputs.skip != 'true'
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | grep -v "$TAG" | head -1)
          if [[ -z "$PREV_TAG" ]]; then
            echo "# ArcKit $TAG" > /tmp/release-notes.md
          else
            PREV_TAG=$(git tag -l 'v*' --sort=-v:refname | sed -n '2p')
            ./scripts/generate-release-notes.sh "$PREV_TAG" > /tmp/release-notes.md
          fi

      - name: Create GitHub Release
        if: steps.check.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ steps.tag.outputs.tag }}
        run: |
          gh release create "$TAG_NAME" \
            --title "ArcKit $TAG_NAME" \
            --notes-file /tmp/release-notes.md \
            || {
              echo "::warning::Release creation failed (may already exist or permission issue)"
              exit 1
            }