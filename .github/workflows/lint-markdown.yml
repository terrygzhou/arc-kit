name: Lint Markdown

on:
  push:
    branches: [main]
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/lint-markdown.yml"
      - "scripts/check_references.py"
      - "scripts/check_recipes.py"
      - "scripts/check_doctype_collisions.py"
      - "arckit-*/recipes/**"
      - "arckit-claude/skills/arckit-build/recipes/**"
      - "arckit-claude/config/doc-types.mjs"
      - "arckit-claude/.claude-plugin/plugin.json"
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.jsonc"
      - ".github/workflows/lint-markdown.yml"
      - "scripts/check_references.py"
      - "scripts/check_recipes.py"
      - "scripts/check_doctype_collisions.py"
      - "arckit-*/recipes/**"
      - "arckit-claude/skills/arckit-build/recipes/**"
      - "arckit-claude/config/doc-types.mjs"
      - "arckit-claude/.claude-plugin/plugin.json"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: "**/*.md"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps for reference linter
        run: pip install pyyaml

      - name: Cross-reference linter
        run: python3 scripts/check_references.py

      - name: Recipe sanity linter
        run: python3 scripts/check_recipes.py

      - name: Doc-type collision check
        run: python3 scripts/check_doctype_collisions.py

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Dual-registration test for doc-types
        run: node scripts/tests/test-doc-types-dual-registration.mjs

      - name: Install npm deps for validator tests
        run: npm ci

      - name: Handoff schema validator tests (datascout)
        run: node tests/plugin/test_validate_handoff.mjs

      - name: Handoff schema validator tests (grants)
        run: node tests/plugin/test_validate_grants_handoff.mjs

      - name: Handoff schema validator tests (gov-reuse)
        run: node tests/plugin/test_validate_gov_reuse_handoff.mjs

      - name: Wardley label-tidy hook tests
        run: node --test tests/plugin/tidy-wardley-labels.test.mjs tests/plugin/wardley-tidy.test.mjs
